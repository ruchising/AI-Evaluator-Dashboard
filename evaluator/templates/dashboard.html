<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="bg-dark text-white p-3 mb-3">
    <h4>AI Evaluator Dashboard</h4>
</div>

<div class="container">

    <a href="/" class="btn btn-primary mb-3" style="background-color: #a72857; border-color: #a72898;">New Evaluation</a>

  
    {% for item in data %}
        <div class="card p-3 mb-3">
            <p><b>Prompt:</b> {{item.prompt}}</p>
            <p>Accuracy: {{item.accuracy}}</p>
            <p>Relevance: {{item.relevance}}</p>
            <p>Coherence: {{item.coherence}}</p>
        </div>
    {% endfor %}

   
    <h4 class="mt-4" style="color: #a7288e;">Evaluation Graph</h4>
    <canvas id="myChart"></canvas>

</div>


<script>
const ctx = document.getElementById('myChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Avg Accuracy', 'Avg Relevance', 'Avg Coherence'],
        datasets: [{
            label: 'Evaluation Scores',
            data: [
                {{ avg_accuracy }},
                {{ avg_relevance }},
                {{ avg_coherence }}
            ]
        }]
    }
});
</script>

</body>
</html>
