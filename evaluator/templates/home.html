<!DOCTYPE html>
<html>
<head>
    <title style="color: #a7288c;">AI Evaluator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
    <h2 class="text-center" style="color: #7428a7;">AI Response Evaluator</h2>

   <form method="POST">
    {% csrf_token %}

    <textarea name="prompt" class="form-control" placeholder="Enter your prompt..." required></textarea>

    <button type="submit" class="btn btn-success mt-2" style="background-color: #a72857; border-color: #a72898;">
        Generate Response
    </button>
</form>
</div>

</body>
</html>
